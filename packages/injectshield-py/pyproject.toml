[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "injectshield"
version = "0.1.0"
description = "Python SDK for InjectShield — prompt-injection firewall for AI agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "Brett Halverson" }]
keywords = ["prompt-injection", "ai-security", "llm", "guardrails", "claude", "agents"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "httpx>=0.25",
]

[project.urls]
Homepage = "https://injectshield.dev"
Repository = "https://github.com/bch1212/injectshield"
Documentation = "https://injectshield.dev/docs"
Issues = "https://github.com/bch1212/injectshield/issues"

[project.optional-dependencies]
test = ["pytest>=7", "pytest-asyncio>=0.21", "pytest-httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["injectshield"]
