name: Publish @modelwatch/mcp (one-shot)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Clone modelwatch
        run: git clone --depth 1 https://github.com/bch1212/modelwatch.git mw

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install + build
        working-directory: mw/mcp-server
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Publish to npm
        working-directory: mw/mcp-server
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm to index
        run: |
          for i in $(seq 1 12); do
            ver=$(curl -sS "https://registry.npmjs.org/@modelwatch/mcp" | jq -r "\".dist-tags\".latest // empty")
            if [ -n "$ver" ]; then echo "indexed: $ver"; exit 0; fi
            sleep 5
          done

      - name: Get OIDC token
        id: oidc
        run: |
          token=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.modelcontextprotocol.io" | jq -r ".value")
          echo "::add-mask::$token"
          echo "oidc=$token" >> "$GITHUB_OUTPUT"

      - name: Exchange for registry JWT
        id: exchange
        run: |
          resp=$(curl -sS -X POST https://registry.modelcontextprotocol.io/v0/auth/github-oidc \
            -H "content-type: application/json" \
            -d "{\"oidc_token\":\"${{ steps.oidc.outputs.oidc }}\"}")
          tok=$(echo "$resp" | jq -r ".token // .registry_token // empty")
          if [ -z "$tok" ]; then echo "$resp"; exit 1; fi
          echo "::add-mask::$tok"
          echo "tok=$tok" >> "$GITHUB_OUTPUT"

      - name: Submit server.json to MCP Registry
        working-directory: mw/mcp-server
        run: |
          resp=$(curl -sS -X POST https://registry.modelcontextprotocol.io/v0/publish \
            -H "Authorization: Bearer ${{ steps.exchange.outputs.tok }}" \
            -H "content-type: application/json" \
            -d @server.json)
          echo "publish resp: $resp"
